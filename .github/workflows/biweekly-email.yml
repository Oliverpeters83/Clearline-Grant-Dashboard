name: Biweekly funding email
on:
  schedule:
    - cron: "0 14 1,15 * *"
  workflow_dispatch:
jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Send funding digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: python scripts/email_digest.py
      - name: Save email history
        run: |
          git config user.name "Clearline Funding Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/email-state.json
          git diff --cached --quiet || git commit -m "Record emailed grant opportunities"
          git push
