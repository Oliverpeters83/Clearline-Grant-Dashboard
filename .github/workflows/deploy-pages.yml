# Clearline grant dashboard deployment
name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "styles.css"
      - "app.js"
      - "data/grants.json"
      - ".github/workflows/deploy-pages.yml"
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out dashboard
        uses: actions/checkout@v4
      - name: Prepare public dashboard files
        run: |
          mkdir _site
          cp index.html styles.css app.js _site/
          mkdir _site/data
          cp data/grants.json _site/data/
          printf 'window.CLEARLINE_GRANT_DATA = ' > _site/data/grants.js
          cat data/grants.json >> _site/data/grants.js
          printf ';\n' >> _site/data/grants.js
          touch _site/.nojekyll
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v4
